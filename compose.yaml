services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: bead
      POSTGRES_USER: bead
      POSTGRES_PASSWORD: bead
    ports:
      - "5432:5432"
    volumes:
      - bead-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bead -d bead"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  bead-postgres-data:
