name: iOS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-ios:
    name: Validate iOS release build
    if: github.event_name == 'pull_request'
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      VITE_API_URL: ${{ vars.VITE_API_URL }}
      VITE_UMAMI_SCRIPT_URL: ${{ vars.VITE_UMAMI_SCRIPT_URL }}
      VITE_UMAMI_WEBSITE_ID: ${{ vars.VITE_UMAMI_WEBSITE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate build environment
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "VITE_API_URL repository variable is required for iOS builds." >&2
            exit 1
          fi

      - name: Add iOS platform
        run: bun run cap:add:ios

      - name: Sync iOS platform
        run: bun run cap:sync:ios

      - name: Validate unsigned release build
        working-directory: apps/client/ios/App
        run: |
          if [ -d App.xcworkspace ]; then
            project_args=(-workspace App.xcworkspace)
          else
            project_args=(-project App.xcodeproj)
          fi

          xcodebuild build \
            "${project_args[@]}" \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

  release-ios:
    name: Build and publish unsigned iOS IPA
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: write
    env:
      VITE_API_URL: ${{ vars.VITE_API_URL }}
      VITE_UMAMI_SCRIPT_URL: ${{ vars.VITE_UMAMI_SCRIPT_URL }}
      VITE_UMAMI_WEBSITE_ID: ${{ vars.VITE_UMAMI_WEBSITE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate build environment
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "VITE_API_URL repository variable is required for iOS builds." >&2
            exit 1
          fi

      - name: Generate release metadata
        id: version
        run: |
          echo "date=$(date -u +'%Y%m%d')" >> "$GITHUB_OUTPUT"
          echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "version_code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "version_name=0.1.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Add iOS platform
        run: bun run cap:add:ios

      - name: Sync iOS platform
        run: bun run cap:sync:ios

      - name: Build unsigned iOS app
        working-directory: apps/client/ios/App
        env:
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
        run: |
          if [ -d App.xcworkspace ]; then
            project_args=(-workspace App.xcworkspace)
          else
            project_args=(-project App.xcodeproj)
          fi

          xcodebuild build \
            "${project_args[@]}" \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            MARKETING_VERSION="$VERSION_NAME" \
            CURRENT_PROJECT_VERSION="$VERSION_CODE" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package unsigned IPA
        run: |
          products_dir="$RUNNER_TEMP/DerivedData/Build/Products/Release-iphoneos"
          app_path="$(find "$products_dir" -maxdepth 1 -name '*.app' -type d | head -n 1)"

          if [ -z "$app_path" ]; then
            echo "No .app bundle found in $products_dir." >&2
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/unsigned-ipa/Payload"
          cp -R "$app_path" "$RUNNER_TEMP/unsigned-ipa/Payload/"

          cd "$RUNNER_TEMP/unsigned-ipa"
          zip -qry "$RUNNER_TEMP/Bead-unsigned.ipa" Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: bead-ios-${{ steps.version.outputs.version_name }}-unsigned
          path: ${{ runner.temp }}/Bead-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Publish iOS prerelease
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: ${{ runner.temp }}/Bead-unsigned.ipa
          fail_on_unmatched_files: true
          tag_name: ios-v${{ steps.version.outputs.date }}-${{ github.run_number }}
          target_commitish: ${{ github.sha }}
          name: Bead iOS v${{ steps.version.outputs.version_name }} (unsigned)
          body: |
            iOS unsigned IPA build

            Version: ${{ steps.version.outputs.version_name }}
            Build #${{ github.run_number }}
            Commit: ${{ github.sha }}
            Date: ${{ steps.version.outputs.timestamp }}
          draft: false
          prerelease: true
