name: iOS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  build-unsigned-ipa:
    name: Build unsigned IPA
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      VITE_API_URL: ${{ vars.VITE_API_URL }}
      VITE_UMAMI_SCRIPT_URL: ${{ vars.VITE_UMAMI_SCRIPT_URL }}
      VITE_UMAMI_WEBSITE_ID: ${{ vars.VITE_UMAMI_WEBSITE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate build environment
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "VITE_API_URL repository variable is required for iOS builds." >&2
            exit 1
          fi

      - name: Add iOS platform
        run: bun run cap:add:ios

      - name: Sync iOS platform
        run: bun run cap:sync:ios

      - name: Build unsigned iOS app
        working-directory: apps/client/ios/App
        run: |
          if [ -d App.xcworkspace ]; then
            project_args=(-workspace App.xcworkspace)
          else
            project_args=(-project App.xcodeproj)
          fi

          xcodebuild build \
            "${project_args[@]}" \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package unsigned IPA
        run: |
          products_dir="$RUNNER_TEMP/DerivedData/Build/Products/Release-iphoneos"
          app_path="$(find "$products_dir" -maxdepth 1 -name '*.app' -type d | head -n 1)"

          if [ -z "$app_path" ]; then
            echo "No .app bundle found in $products_dir." >&2
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/unsigned-ipa/Payload"
          cp -R "$app_path" "$RUNNER_TEMP/unsigned-ipa/Payload/"

          cd "$RUNNER_TEMP/unsigned-ipa"
          zip -qry "$RUNNER_TEMP/Bead-unsigned.ipa" Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v5
        with:
          name: bead-ios-unsigned-ipa
          path: ${{ runner.temp }}/Bead-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Generate version tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: version
        run: |
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "build_number=$(date +'%s')" >> $GITHUB_OUTPUT

      - name: Upload to latest Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ runner.temp }}/Bead-unsigned.ipa
          tag_name: latest
          name: Latest iOS IPA
          body: |
            Latest iOS unsigned IPA build
            
            Build #${{ github.run_number }}
            Commit: ${{ github.sha }}
            Date: ${{ github.event.head_commit.timestamp }}
          draft: false
          prerelease: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to versioned Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ runner.temp }}/Bead-unsigned.ipa
          tag_name: ios-v${{ steps.version.outputs.date }}-${{ github.run_number }}
          name: iOS IPA v${{ steps.version.outputs.date }}-${{ github.run_number }}
          body: |
            iOS unsigned IPA build - versioned release
            
            Build #${{ github.run_number }}
            Commit: ${{ github.sha }}
            Date: ${{ github.event.head_commit.timestamp }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
