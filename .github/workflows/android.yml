name: Android

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VITE_API_URL: ${{ vars.VITE_API_URL }}
      VITE_UMAMI_SCRIPT_URL: ${{ vars.VITE_UMAMI_SCRIPT_URL }}
      VITE_UMAMI_WEBSITE_ID: ${{ vars.VITE_UMAMI_WEBSITE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate build environment
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "VITE_API_URL repository variable is required for Android builds." >&2
            exit 1
          fi

      - name: Add Android platform
        run: bun run cap:add:android

      - name: Sync Android platform
        run: bun run cap:sync:android

      - name: Build debug APK
        working-directory: apps/client/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v5
        with:
          name: bead-android-debug-apk
          path: apps/client/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Generate version tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: version
        run: |
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "build_number=$(date +'%s')" >> $GITHUB_OUTPUT

      - name: Upload to latest Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: apps/client/android/app/build/outputs/apk/debug/*.apk
          tag_name: latest
          name: Latest Mobile Builds
          body: |
            Latest iOS and Android builds.

            Build #${{ github.run_number }}
            Commit: ${{ github.sha }}
            Date: ${{ github.event.head_commit.timestamp }}
          draft: false
          prerelease: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to versioned Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: apps/client/android/app/build/outputs/apk/debug/*.apk
          tag_name: android-v${{ steps.version.outputs.date }}-${{ github.run_number }}
          name: Android APK v${{ steps.version.outputs.date }}-${{ github.run_number }}
          body: |
            Android debug APK build - versioned release

            Build #${{ github.run_number }}
            Commit: ${{ github.sha }}
            Date: ${{ github.event.head_commit.timestamp }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
